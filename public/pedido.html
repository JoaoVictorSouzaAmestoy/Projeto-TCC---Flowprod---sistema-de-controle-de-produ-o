<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowProd — Fazer Pedido</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:#080d14; color:#e8edf5; font-family:'Poppins',sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
  }

  /* ── Topbar ── */
  .topbar {
    background:#0d1520; border-bottom:1px solid #1a2740;
    padding:0 32px; height:56px; display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0;
  }
  .topbar-left { display:flex; align-items:center; gap:10px; }
  .logo { font-size:17px; font-weight:700; color:#2b7fff; letter-spacing:1px; }
  .divider-v { width:1px; height:22px; background:#1a2740; }
  .page-title { font-size:13px; color:#6b82a0; }
  .topbar-right { display:flex; align-items:center; gap:12px; }
  .user-chip { display:flex; align-items:center; gap:8px; background:#080d14; border:1px solid #1a2740; border-radius:8px; padding:5px 12px; }
  .user-av { width:26px; height:26px; border-radius:50%; background:linear-gradient(135deg,#0e7490,#06b6d4); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; }
  .user-nm { font-size:13px; color:#a0b0c8; }
  .btn-logout { background:none; border:1px solid #1a2740; color:#6b82a0; padding:5px 14px; border-radius:6px; font-size:12px; cursor:pointer; font-family:'Poppins',sans-serif; transition:.2s; }
  .btn-logout:hover { border-color:#f43f5e; color:#f43f5e; }

  /* ── Área principal ── */
  .main {
    flex:1; display:flex; align-items:center; justify-content:center;
    padding:24px 16px;
  }

  /* ── Card do formulário ── */
  .card {
    background:#0d1520; border:1px solid #1a2740; border-radius:16px;
    padding:36px 40px; width:100%; max-width:820px;
  }
  .card-header {
    display:flex; align-items:center; gap:16px; margin-bottom:28px;
    padding-bottom:20px; border-bottom:1px solid #1a2740;
  }
  .card-icon { font-size:40px; filter:drop-shadow(0 0 16px rgba(43,127,255,.35)); }
  .card-title { font-size:22px; font-weight:700; }
  .card-sub   { font-size:13px; color:#4a6080; margin-top:3px; }
  .badge-cli  { margin-left:auto; padding:5px 14px; border-radius:6px; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; background:rgba(43,127,255,.12); color:#2b7fff; border:1px solid rgba(43,127,255,.2); }

  /* ── Grid 2 colunas ── */
  .form-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:18px 24px;
  }
  .span-2 { grid-column: span 2; }

  .form-group { display:flex; flex-direction:column; gap:6px; }
  label { font-size:11px; font-weight:600; color:#6b82a0; text-transform:uppercase; letter-spacing:.7px; }
  input, textarea, select {
    background:#080d14; border:1px solid #1a2740; border-radius:8px;
    color:#e8edf5; font-family:'Poppins',sans-serif; font-size:14px;
    padding:10px 14px; transition:.2s; outline:none; width:100%;
  }
  input:focus, textarea:focus, select:focus { border-color:#2b7fff; }
  textarea { resize:vertical; min-height:80px; }

  /* ── Rodapé do formulário ── */
  .form-footer {
    margin-top:24px; display:flex; align-items:center; gap:16px;
    padding-top:20px; border-top:1px solid #1a2740;
  }
  .aviso {
    flex:1; display:flex; align-items:center; gap:8px;
    background:#080d14; border:1px solid #1a2740; border-radius:8px; padding:10px 14px;
  }
  .aviso span { font-size:12px; color:#3a5070; line-height:1.5; }

  .btn-enviar {
    background:linear-gradient(135deg,#1a5ccc,#2b7fff); border:none; border-radius:8px;
    color:#fff; cursor:pointer; font-family:'Poppins',sans-serif;
    font-size:14px; font-weight:600; padding:12px 32px; transition:.2s; white-space:nowrap;
    display:flex; align-items:center; gap:8px;
  }
  .btn-enviar:hover { opacity:.9; transform:translateY(-1px); }
  .btn-enviar:disabled { opacity:.5; cursor:not-allowed; transform:none; }

  .spinner {
    width:14px; height:14px; border:2px solid rgba(255,255,255,.3);
    border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:none;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  .msg {
    border-radius:8px; font-size:13px; padding:10px 14px; display:none; margin-top:12px;
  }
  .msg.ok  { background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.25); color:#22c55e; }
  .msg.err { background:rgba(244,63,94,.1);  border:1px solid rgba(244,63,94,.25); color:#f43f5e; }

  @media(max-width:600px) {
    .form-grid { grid-template-columns:1fr; }
    .span-2 { grid-column:span 1; }
    .form-footer { flex-direction:column; }
    .card { padding:24px 20px; }
  }

  /* ── Sino cliente ── */
  .sino-wrap { position:relative; }
  .sino-btn {
    background:none; border:1px solid #1a2740; border-radius:8px;
    color:#6b82a0; cursor:pointer; padding:6px 10px; font-size:16px;
    transition:.2s; position:relative; line-height:1;
  }
  .sino-btn:hover { border-color:#06b6d4; color:#06b6d4; }
  .sino-badge {
    position:absolute; top:-6px; right:-6px;
    background:#f43f5e; color:#fff; font-size:10px; font-weight:700;
    width:18px; height:18px; border-radius:50%;
    display:none; align-items:center; justify-content:center;
    border:2px solid #080d14;
  }
  .notif-painel {
    display:none; position:absolute; top:calc(100% + 8px); right:0;
    width:320px; background:#0d1520; border:1px solid #1a2740;
    border-radius:12px; z-index:200;
    box-shadow:0 12px 40px rgba(0,0,0,.5); overflow:hidden;
  }
  .notif-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:13px 16px; border-bottom:1px solid #1a2740;
  }
  .notif-header span { font-size:13px; font-weight:600; }
  .notif-marcar {
    background:none; border:none; color:#6b82a0; cursor:pointer;
    font-size:11px; font-family:'Poppins',sans-serif; transition:.2s;
  }
  .notif-marcar:hover { color:#06b6d4; }
  .notif-lista { max-height:300px; overflow-y:auto; }
  .notif-item {
    padding:12px 16px; border-bottom:1px solid #0d1928;
    display:flex; gap:10px; align-items:flex-start; transition:.15s;
  }
  .notif-item:hover { background:#080d14; }
  .notif-item.nao-lida { background:rgba(6,182,212,.05); }
  .notif-dot { width:7px; height:7px; border-radius:50%; background:#06b6d4; margin-top:5px; flex-shrink:0; }
  .notif-dot.lida { background:#1a2740; }
  .notif-titulo { font-size:13px; font-weight:600; margin-bottom:2px; }
  .notif-msg { font-size:12px; color:#6b82a0; line-height:1.5; }
  .notif-tempo { font-size:11px; color:#3a5070; margin-top:3px; }
  .notif-vazia { padding:28px; text-align:center; color:#3a5070; font-size:13px; }

</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="logo">FlowProd</span>
    <div class="divider-v"></div>
    <span class="page-title">Área do Cliente</span>
  </div>
  <div class="topbar-right">
    <div class="sino-wrap">
      <button class="sino-btn" onclick="toggleNotif(event)" title="Notificações">
        🔔
        <span class="sino-badge" id="sinoBadge"></span>
      </button>
      <div class="notif-painel" id="notifPainel">
        <div class="notif-header">
          <span>Notificações</span>
          <button class="notif-marcar" onclick="marcarLidas()">Marcar lidas</button>
        </div>
        <div class="notif-lista" id="notifLista">
          <div class="notif-vazia">Sem notificações</div>
        </div>
      </div>
    </div>
    <div class="user-chip">
      <div class="user-av" id="avatar">?</div>
      <span class="user-nm" id="userName">Carregando...</span>
    </div>
    <button class="btn-logout" onclick="sair()">Sair</button>
  </div>
</div>

<div class="main">
  <div class="card">

    <div class="card-header">
      <div class="card-icon">📝</div>
      <div>
        <div class="card-title">Novo Pedido</div>
        <div class="card-sub">Preencha os campos abaixo. Sua solicitação será encaminhada ao Forecast.</div>
      </div>
      <span class="badge-cli">CLIENTE</span>
    </div>

    <div class="form-grid">

      <div class="form-group">
        <label>Produto / Item *</label>
        <input type="text" id="produto" placeholder="Ex: Parafuso M8 x 30mm" maxlength="200">
      </div>

      <div class="form-group">
        <label>Quantidade *</label>
        <input type="number" id="quantidade" placeholder="Ex: 500" min="1">
      </div>

      <div class="form-group">
        <label>Prazo de entrega desejado</label>
        <input type="date" id="prazo">
      </div>

      <div class="form-group">
        <label>Unidade (opcional)</label>
        <input type="text" id="unidade" placeholder="Ex: pç, kg, m, caixa">
      </div>

      <div class="form-group span-2">
        <label>Especificações / Observações</label>
        <textarea id="observacoes" placeholder="Descreva detalhes, normas técnicas, urgências ou qualquer informação relevante para o pedido..."></textarea>
      </div>

    </div>

    <div class="msg" id="msgPedido"></div>

    <div class="form-footer">
      <div class="aviso">
        <span>🔒</span>
        <span>Pedido vinculado à sua conta. Apenas o responsável de Forecast terá acesso.</span>
      </div>
      <button class="btn-enviar" id="btnEnviar" onclick="enviarPedido()">
        <span id="btnText">Enviar Pedido</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </div>

  </div>
</div>

<script>
  // Carrega dados do cliente logado
  fetch('/api/clientes/me', { credentials:'include' })
    .then(r => { if(!r.ok) throw new Error(); return r.json(); })
    .then(d => {
      document.getElementById('userName').textContent = d.cliente.nome;
      document.getElementById('avatar').textContent   = d.cliente.nome.charAt(0).toUpperCase();
    })
    .catch(() => window.location.href = '/');

  async function enviarPedido() {
    const produto    = document.getElementById('produto').value.trim();
    const quantidade = document.getElementById('quantidade').value.trim();
    const prazo      = document.getElementById('prazo').value;
    const unidade    = document.getElementById('unidade').value.trim();
    const obs        = document.getElementById('observacoes').value.trim();
    const msg        = document.getElementById('msgPedido');
    const btn        = document.getElementById('btnEnviar');
    const spinner    = document.getElementById('spinner');
    const btnText    = document.getElementById('btnText');

    msg.style.display = 'none';

    if (!produto || !quantidade) {
      msg.textContent = 'Produto e quantidade são obrigatórios.';
      msg.className = 'msg err'; msg.style.display = 'block';
      return;
    }

    btn.disabled = true; btnText.style.display = 'none'; spinner.style.display = 'block';

    try {
      const r = await fetch('/api/pedidos', {
        method:'POST', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ produto, quantidade:parseInt(quantidade), prazo:prazo||null, unidade:unidade||null, observacoes:obs })
      });
      const d = await r.json();
      if (r.ok) {
        msg.textContent = '✅ Pedido enviado com sucesso! Aguarde o contato do responsável.';
        msg.className = 'msg ok'; msg.style.display = 'block';
        ['produto','quantidade','prazo','unidade','observacoes'].forEach(id => document.getElementById(id).value='');
        btnText.textContent = '✔ Enviado!'; btnText.style.display = 'block'; spinner.style.display = 'none';
        btn.style.background = 'linear-gradient(135deg,#15803d,#22c55e)';
      } else {
        throw new Error(d.erro || 'Erro ao enviar.');
      }
    } catch(e) {
      msg.textContent = e.message; msg.className = 'msg err'; msg.style.display = 'block';
      btn.disabled = false; btnText.style.display = 'block'; spinner.style.display = 'none';
    }
  }

  async function sair() {
    await fetch('/api/clientes/logout', { method:'POST', credentials:'include' });
    window.location.href = '/';
  }

  // ── Notificações do cliente ──────────────────────────────
  let _notifAbertas = false;

  function toggleNotif(e) {
    e.stopPropagation();
    const p = document.getElementById('notifPainel');
    _notifAbertas = !_notifAbertas;
    p.style.display = _notifAbertas ? 'block' : 'none';
    if (_notifAbertas) carregarNotifCliente();
  }
  document.addEventListener('click', () => {
    if (_notifAbertas) {
      document.getElementById('notifPainel').style.display = 'none';
      _notifAbertas = false;
    }
  });
  document.getElementById('notifPainel')?.addEventListener('click', e => e.stopPropagation());

  async function carregarNotifCliente() {
    try {
      const r = await fetch('/api/notificacoes/cliente', { credentials:'include' });
      const d = await r.json();
      renderNotif(d.notificacoes || []);
    } catch {}
  }

  function renderNotif(lista) {
    const el = document.getElementById('notifLista');
    if (!lista.length) { el.innerHTML = '<div class="notif-vazia">Sem notificações 🎉</div>'; return; }
    el.innerHTML = lista.map(n => {
      const lida = n.lida;
      const diff = Date.now() - new Date(n.criado_em).getTime();
      const min  = Math.floor(diff/60000), h = Math.floor(diff/3600000), d = Math.floor(diff/86400000);
      const tempo = min<1?'agora':min<60?`há ${min} min`:h<24?`há ${h}h`:`há ${d}d`;
      return `<div class="notif-item ${lida?'':'nao-lida'}">
        <div class="notif-dot ${lida?'lida':''}"></div>
        <div style="flex:1;">
          <div class="notif-titulo">${n.titulo}</div>
          ${n.mensagem?`<div class="notif-msg">${n.mensagem}</div>`:''}
          <div class="notif-tempo">${tempo}</div>
        </div>
      </div>`;
    }).join('');
  }

  async function marcarLidas() {
    try {
      await fetch('/api/notificacoes/cliente/marcar-lidas', { method:'POST', credentials:'include' });
      document.getElementById('sinoBadge').style.display = 'none';
      document.querySelectorAll('.notif-item').forEach(el => {
        el.classList.remove('nao-lida');
        el.querySelector('.notif-dot')?.classList.add('lida');
      });
    } catch {}
  }

  async function atualizarBadgeCliente() {
    try {
      const r = await fetch('/api/notificacoes/cliente/nao-lidas', { credentials:'include' });
      const d = await r.json();
      const badge = document.getElementById('sinoBadge');
      if (d.total > 0) {
        badge.textContent = d.total > 9 ? '9+' : d.total;
        badge.style.display = 'inline-flex';
      } else {
        badge.style.display = 'none';
      }
    } catch {}
  }

  atualizarBadgeCliente();
  setInterval(atualizarBadgeCliente, 30000);

</script>
</body>
</html>
